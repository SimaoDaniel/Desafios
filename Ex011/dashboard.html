<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Developers | Dashboard</title>
    <style>
        :root {
            --sidebar-width: 250px;
            --primary: #3b82f6;
            --dark-bg: #0f172a;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background-color: #f1f5f9; color: var(--text-main); display: flex; min-height: 100vh; flex-direction: column; }

        /* TEMA 3: Layout Principal com Flexbox */
        .wrapper { display: flex; flex: 1; flex-direction: column; }

        /* SIDEBAR */
        aside {
            background-color: var(--dark-bg);
            color: white;
            padding: 20px;
            width: 100%; /* Mobile First: Ocupa tudo no topo */
        }

        nav ul { list-style: none; display: flex; gap: 15px; justify-content: center; }
        nav a { color: white; text-decoration: none; font-size: 0.9rem; }

        /* CONTEÚDO PRINCIPAL */
        main { flex: 1; padding: 20px; }

        .welcome-header { margin-bottom: 30px; }

        /* FORMULÁRIO (MÓDULO 1 e 2) */
        .form-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }

        /* TABELA RESPONSIVA (TEMA ADICIONAL MÓDULO 3) */
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto; /* A Mágica: Cria scroll lateral se a tabela for larga */
        }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: #f8fafc; color: var(--primary); }

        .status-badge { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }

        /* TEMA 2: MEDIA QUERIES PARA DESKTOP */
        @media screen and (min-width: 768px) {
            .wrapper { flex-direction: row; } /* Sidebar à esquerda, Conteúdo à direita */
            
            aside {
                width: var(--sidebar-width);
                height: 100vh;
                position: sticky;
                top: 0;
            }

            nav ul { flex-direction: column; gap: 20px; margin-top: 40px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <aside>
            <h2>Prime Devs</h2>
            <nav>
                <ul>
                    <li><a href="#">🏠 Dashboard</a></li>
                    <li><a href="#">📚 Meus Cursos</a></li>
                    <li><a href="#">🏆 Ranking</a></li>
                    <li><a href="#">⚙️ Configurações</a></li>
                </ul>
            </nav>
        </aside>

        <main>
            <div class="welcome-header">
                <h1>Olá, Simão!</h1>
                <p>Módulo Atual: <strong>3 - CSS Responsivo</strong></p>
            </div>

            <section class="form-card">
                <h3>Atualizar Progresso</h3>
                <form action="#">
                    <div class="form-group">
                        <label>Desafio Concluído:</label>
                        <input type="text" placeholder="Ex: Projeto 2">
                    </div>
                    <div class="form-group">
                        <label>Nota de Auto-avaliação (1-10):</label>
                        <input type="number" min="1" max="10">
                    </div>
                    <button type="submit" style="background: var(--primary); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Enviar Relatório</button>
                </form>
            </section>

            <section class="table-container">
                <h3>Meus Últimos Projetos</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Projeto</th>
                            <th>Data</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Links Flarex</td>
                            <td>10/03/2026</td>
                            <td><span class="status-badge">Concluído</span></td>
                        </tr>
                        <tr>
                            <td>Landing Page</td>
                            <td>11/03/2026</td>
                            <td><span class="status-badge">Concluído</span></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

</body>
</html>
