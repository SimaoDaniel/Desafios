<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="cabecalho">
        <h1>Daniel E-commerce</h1>
        <p>Tua e minha virtual shop</p>
    </header>
    <div class="card">
        <h2>Card de Produtos</h2>
    </div>
    <main class="conteudo-principal">
        <section class="secao-produto">
            <div class="descricao-produto">
                <h3>Equipamento da Juventus</h3>
                <img src="imagem/Cristiano-Ronaldo-Png-1024x1024.png" alt="juventus">
                <p>10.000kz</p>
                <a href="##">Comprar Agora</a>
            </div>
            <div class="descricao-produto">
                <h3>Equipamento do Liverpool</h3>
                <img src="imagem/Darwin-Nunez-Liverpool-Premier-League-Png-1024x1024.png" alt="liverpool">
                <p>8.000kz</p>
                <a href="##">Comprar Agora</a>
            </div>
            <div class="descricao-produto">
                <h3>Moster-Energy</h3>
                <img src="imagem/Lata-Energetico-Monster-Energy-300x300.jpg" alt="Moster-Energy">
                <p>1500kz</p>
                <a href="##">Comprar Agora</a>
            </div>
            <div class="descricao-produto">
                <h3>Equipamento do PSG</h3>
                <img src="imagem/Neymar-Paris-Saint-Germain-Png-1024x1024.png" alt="Paris-Saint-Germain">
                <p>8.500kz</p>
                <a href="##">Comprar Agora</a>
            </div>
        
        </section>
    </main>
    <footer class="copyright">
        <p>&copy;2026, Simão_Daniel</p>
    </footer>
    
</body>
</html>
